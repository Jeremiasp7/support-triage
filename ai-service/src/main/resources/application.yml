server:
  port: 8082

spring:
  application:
    name: ai-service
  config:
    import:
      - optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
      - optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5436/aidb
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
  graphql:
    graphiql:
      enabled: true
  ai:
    mcp:
      server:
        enabled: true
        name: support-triage-mcp-server
        version: 1.0.0
        type: SYNC
        protocol: STREAMABLE
    mistralai:
      api-key: ${MISTRAL_API_KEY}
      chat:
        model: mistral-small-latest
        temperature: 0.3
      embedding:
        model: mistral-embed
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024
        distance-type: COSINE_DISTANCE
        index-type: HNSW

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URI:http://localhost:9411/api/v2/spans}
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"